[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# --import-mode=importlib: do not prepend each test dir to sys.path (avoids
# tests/unit/muse/ shadowing the real top-level ``muse`` package).
addopts = -v --import-mode=importlib --cov=muse --cov=app_qt --cov=ui_qt --cov-report=term-missing
markers =
    unit: Unit tests (fast, mocked or pure)
    integration: Integration tests (real files, multi-component)
    ui: Qt / PySide6 UI tests (offscreen; may boot windows)
    slow: Tests that take longer to run
norecursedirs = scripts fixtures 